<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbi</title>
<style>
  /* Minimal functional scaffold — the real UI is the React app. */
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1220; color: #e8e8f0; min-height: 100vh; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 140px; }
  h1 { font-size: 1.3rem; margin-bottom: 16px; }
  .card { background: #1a1e33; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .card h2 { font-size: 0.95rem; margin-bottom: 10px; color: #9aa2d8; }
  button { background: #5661f0; color: white; border: 0; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 0.9rem; }
  button:disabled { opacity: 0.5; cursor: default; }
  input { background: #10132a; color: #e8e8f0; border: 1px solid #333a5e; border-radius: 8px; padding: 8px 10px; font-size: 0.9rem; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
  .muted { color: #8a90b8; font-size: 0.85rem; }
  .member { padding: 4px 0; font-size: 0.9rem; }
  .ok { color: #7ee787; } .warn { color: #f0b45e; }
  .ask { background: #10132a; border-radius: 8px; padding: 10px; font-size: 0.9rem; line-height: 1.5; }
  .ask button { margin-top: 8px; margin-right: 6px; }
  .hostbox { background: #201a33; border-left: 3px solid #8f9bff; border-radius: 6px;
             padding: 10px; margin-top: 8px; font-size: 0.85rem; line-height: 1.5; }
  .time { color: #667; }
  .time.active { color: #b9c2ff; } .time.confirmed { color: #7ee787; }
  .time.skipped { text-decoration: line-through; }

  /* Orbi's report to the host */
  #report { position: fixed; inset: 0; background: #0009; display: none;
            align-items: center; justify-content: center; padding: 16px; z-index: 10; }
  #report.open { display: flex; }
  #reportcard { background: #1a1e33; border: 1px solid #4633d8; border-radius: 14px;
                padding: 18px; width: min(440px, 100%); max-height: 85vh; overflow-y: auto;
                box-shadow: 0 0 40px #5661f055; font-size: 0.9rem; line-height: 1.5; }
  #reportcard h3 { font-size: 0.95rem; margin-bottom: 2px; }
  .tallyrow { padding: 3px 0; }
  .tallyrow .who { color: #e8e8f0; }
  .seg { margin-top: 12px; padding-top: 10px; border-top: 1px solid #333a5e; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

  /* Orbi orb + chat panel */
  #orb { position: fixed; right: 24px; bottom: 24px; width: 64px; height: 64px; border-radius: 50%;
         background: radial-gradient(circle at 30% 30%, #8f9bff, #4633d8 70%);
         box-shadow: 0 0 24px #5661f088; cursor: pointer; border: 0;
         animation: float 3s ease-in-out infinite; }
  @keyframes float { 50% { transform: translateY(-6px); } }
  #panel { position: fixed; right: 24px; bottom: 100px; width: min(380px, calc(100vw - 48px));
           background: #171b30; border: 1px solid #333a5e; border-radius: 14px; display: none;
           flex-direction: column; max-height: 70vh; }
  #panel.open { display: flex; }
  #log { flex: 1; overflow-y: auto; padding: 14px; }
  .msg { margin-bottom: 10px; line-height: 1.4; font-size: 0.92rem; white-space: pre-wrap; }
  .msg.user { color: #b9c2ff; } .msg.user::before { content: "you  "; color: #667; font-size: 0.75rem; }
  .msg.orbi::before { content: "orbi  "; color: #667; font-size: 0.75rem; }
  .msg.step { color: #8a90b8; font-size: 0.8rem; font-style: italic; }
  #chatform { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #333a5e; }
  #chatform input { flex: 1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Orbi <span class="muted">— group scheduling assistant (scaffold UI)</span></h1>

  <div class="card" id="authcard">
    <h2>Account</h2>
    <div id="authbody"><button onclick="location='/auth/google/login'">Connect Google Calendar</button></div>
  </div>

  <div class="card" id="groupcard" style="display:none">
    <h2>Your group</h2>
    <div id="groupbody"></div>
  </div>

  <div class="card" id="plancard" style="display:none">
    <h2>Plans</h2>
    <div id="planbody" class="muted">No plans yet — ask Orbi to suggest a hangout.</div>
  </div>
</div>

<!-- Orbi's report to the host. Pops up on its own when new votes land. -->
<div id="report"><div id="reportcard"></div></div>

<button id="orb" title="Talk to Orbi"></button>
<div id="panel">
  <div id="log"><div class="msg orbi">Hi! Ask me to find a time for your group to meet.</div></div>
  <form id="chatform">
    <input id="chatinput" placeholder="Find a time this week…" autocomplete="off">
    <button>Send</button>
  </form>
</div>

<script>
const $ = (id) => document.getElementById(id);
let me = null, group = null, history = [], shownPlans = [], planTimer = null;

// Escape anything a person can type before it reaches innerHTML. Plan titles,
// locations and group names are attacker-controlled: a member can ask Orbi for
// a hangout called `<img src=x onerror=...>` and it would otherwise run in every
// other member's browser — voting as them, or reading the host's tally.
const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const api = async (path, opts = {}) => {
  const r = await fetch(path, { credentials: "include",
    headers: { "Content-Type": "application/json" }, ...opts });
  if (!r.ok) throw (await r.json()).detail || r.statusText;
  return r.json();
};

async function boot() {
  try { me = await api("/auth/me"); } catch { return; }  // not logged in
  $("authbody").innerHTML = `<div class="row"><span>${esc(me.email)}</span>
    <span class="${me.calendar_connected ? "ok" : "warn"}">
      ${me.calendar_connected ? "calendar connected" : "calendar NOT connected"}</span></div>`;
  $("groupcard").style.display = "";
  const groups = await api("/groups");
  if (groups.length) { group = groups[0]; renderGroup(); }
  else $("groupbody").innerHTML = `
    <div class="row"><input id="gname" placeholder="Group name">
      <button onclick="createGroup()">Create</button></div>
    <div class="row"><input id="gcode" placeholder="Invite code" maxlength="6">
      <button onclick="joinGroup()">Join</button></div>`;
}

async function renderGroup() {
  const members = await api(`/groups/${group.id}/members`);
  $("groupbody").innerHTML = `
    <div class="row"><b>${esc(group.name)}</b>
      <span class="muted">invite code: <b>${esc(group.invite_code)}</b></span></div>
    ${members.map(m => `<div class="member">${esc(m.email)}
      <span class="${m.calendar_connected ? "ok" : "warn"}">
        ${m.calendar_connected ? "✓" : "no calendar"}</span></div>`).join("")}`;
  $("plancard").style.display = "";
  renderPlans();
  // No push channel — poll so votes reach the host without a refresh.
  if (!planTimer) planTimer = setInterval(() => renderPlans().catch(() => {}), 5000);
}

// The two-stage cascade, as the member experiences it: you're asked about the
// plan first, and only your own yes opens the time question — no waiting on
// anyone else. `ballot` from the API says which question you're on right now.
function renderBallot(p) {
  const b = p.ballot;
  if (b.stage === "interest")
    return `<div class="ask"><b>${esc(p.host)}</b> suggested ${esc(p.title)}
      ${p.location ? `at <b>${esc(p.location)}</b>` : ""} on <b>${esc(p.day)}</b>. Are you in?
      <span class="muted">(the time comes next)</span><br>
      <button onclick="voteInterest(${p.id}, true)">I'm in</button>
      <button onclick="voteInterest(${p.id}, false)" style="background:#7a3a4a">Not this one</button>
    </div>`;
  if (b.stage === "time")
    return `<div class="ask">You're in. Does <b>${esc(b.time_label)}</b> work for you?<br>
      <button onclick="voteTime(${p.id}, ${b.round_id}, true)">That works</button>
      <button onclick="voteTime(${p.id}, ${b.round_id}, false)" style="background:#7a3a4a">Not then</button>
    </div>`;
  return `<div class="muted">${esc(b.note)}</div>`;
}

// Only the host sees this, and it is the only place a decision gets made —
// they read it and tell Orbi to lock the time in or move to the next one.
function renderHostBox(p) {
  if (!p.host_box) return "";
  return `<div class="hostbox"><b class="muted">Your call (you suggested this)</b><br>
    ${p.host_box.note}
    <div class="muted" style="margin-top:6px">Tell Orbi what to do.</div></div>`;
}

// ---- Orbi's report to the host -------------------------------------------
// The host is the only one who decides anything, so when votes land they get
// the full picture unprompted: every member, on both questions, and the two
// moves they can make. The buttons don't book anything themselves — they say
// it to Orbi in words, so the agent stays the single path to a calendar and
// the guard rules live in one place (plan_service.py).

const line = (label, who, cls = "muted") =>
  `<div class="tallyrow"><span class="${cls}">${label}</span>
     <span class="who">${who.length ? esc(who.join(", ")) : "—"}</span></div>`;

// "Mon 20 Jul 17:00-18:00" -> "17:00-18:00"; the day is already in the header,
// so the buttons only need the clock part.
const hhmm = (round) => round.label.split(" ").slice(-1)[0];

// Identity of a tally: changes only when someone actually answers something.
const tallySig = (p) => {
  const h = p.host_box, a = p.times.find(t => t.status === "active");
  return JSON.stringify([p.id, p.status, a ? a.round_id : null,
    h.interested, h.not_interested, h.time_yes, h.time_no]);
};

const hasAnswers = (h) =>
  h.not_interested.length || h.time_yes.length || h.time_no.length ||
  h.interested.length > 1;  // >1 because the host's own yes is automatic

// The tally we've already reported — set when shown, so "Not yet" stays shut
// until somebody actually votes again rather than re-popping on the next tick.
let reportedSig = null;

function showReport(p) {
  const h = p.host_box;
  const active = p.times.find(t => t.status === "active");
  const next = p.times.find(t => t.status === "queued");
  $("reportcard").innerHTML = `
    <h3>${esc(p.title)}</h3>
    <div class="muted" style="margin-bottom:10px">${esc(p.day)}${p.location ? ` @ ${esc(p.location)}` : ""}</div>

    <b class="muted">Who's in for the plan</b>
    ${line("In:", h.interested, "ok")}
    ${line("Not in:", h.not_interested, "warn")}
    ${line("Hasn't answered:", h.no_answer)}

    <div class="seg">
      <b class="muted">${active ? esc(active.label) : "No time on the table"}</b>
      ${line("Can make it:", h.time_yes, "ok")}
      ${line("Can't make it:", h.time_no, "warn")}
      ${line("Hasn't answered:", h.time_waiting)}
    </div>

    <div class="seg actions">
      ${active && h.time_yes.length ? `<button onclick="hostGoAhead(${p.id})">
        Go ahead with ${esc(hhmm(active))} (${h.time_yes.length})</button>` : ""}
      ${next ? `<button onclick="hostNextTime(${p.id})" style="background:#7a3a4a">
        Try ${esc(hhmm(next))} instead</button>` : ""}
      <button onclick="dismissReport()" style="background:#333a5e">Not yet</button>
    </div>
    ${active && h.time_yes.length ? `<div class="muted" style="margin-top:8px">
      Going ahead invites only the ${h.time_yes.length} who said ${esc(hhmm(active))} works.
      ${h.time_no.length ? `${esc(h.time_no.join(", "))} won't be invited.` : ""}</div>` : ""}
    ${next ? `<div class="muted" style="margin-top:4px">
      Trying ${esc(hhmm(next))} asks everyone who's in again, including
      ${h.time_yes.length ? esc(h.time_yes.join(", ")) : "anyone who already said yes"}.</div>` : ""}`;
  $("report").classList.add("open");
}

window.dismissReport = () => $("report").classList.remove("open");

// The buttons speak to Orbi rather than calling a booking endpoint.
window.hostGoAhead = (id) => {
  const p = shownPlans.find(x => x.id === id);
  const t = p.times.find(t => t.status === "active");
  dismissReport();
  askOrbi(`Go ahead with ${t.label} for "${p.title}" — lock it in.`);
};
window.hostNextTime = (id) => {
  const p = shownPlans.find(x => x.id === id);
  const t = p.times.find(t => t.status === "active");
  dismissReport();
  askOrbi(`${t.label} isn't working for "${p.title}" — move on to the next time.`);
};

async function renderPlans() {
  const plans = await api(`/groups/${group.id}/plans`);
  shownPlans = plans;
  if (!plans.length) return;

  // Push the report to the host the moment a new answer lands. Re-showing is
  // keyed on the tally itself, so dismissing it keeps it shut until somebody
  // actually votes again — not just until the next poll tick.
  const decidable = plans.find(p =>
    p.is_host && p.status === "open" && p.host_box && hasAnswers(p.host_box));
  if (decidable && tallySig(decidable) !== reportedSig) {
    reportedSig = tallySig(decidable);
    showReport(decidable);
  }

  $("planbody").innerHTML = plans.map(p => {
    const booked = p.times.find(t => t.booked);
    return `<div class="member" style="margin-bottom:12px">
      <b>${esc(p.title)}</b> <span class="muted">${esc(p.day)}${p.location ? ` @ ${esc(p.location)}` : ""}</span>
      <b class="${p.status === "scheduled" ? "ok" : p.status === "dead" ? "warn" : ""}">
        ${p.status === "open" ? "" : `· ${p.status}`}</b>
      ${booked ? ` · <a href="${esc(booked.event_link)}" target="_blank" rel="noopener noreferrer"
        style="color:#7ee787">booked ✓</a>` : ""}
      <div class="muted" style="margin:4px 0">${p.times.map(t =>
        `<span class="time ${t.status}">${t.label}${
          t.status === "active" ? " ← being asked" :
          t.status === "skipped" ? " (dropped)" :
          t.status === "confirmed" ? " ✓" : " (held back)"}</span>`).join(" · ")}</div>
      ${p.status === "open" ? renderBallot(p) : ""}
      ${renderHostBox(p)}
    </div>`;
  }).join("");
}

window.voteInterest = async (id, yes) => {
  try { await api(`/plans/${id}/interest`, { method: "POST", body: JSON.stringify({ yes }) }); }
  catch (e) { alert(e); }
  renderPlans();  // a yes re-renders straight into the time question
};

window.voteTime = async (id, round_id, yes) => {
  try {
    await api(`/plans/${id}/time-vote`, { method: "POST",
      body: JSON.stringify({ yes, round_id }) });
  } catch (e) { alert(e); }
  renderPlans();
};

window.createGroup = async () => {
  group = await api("/groups", { method: "POST",
    body: JSON.stringify({ name: $("gname").value || "My Group" }) });
  renderGroup();
};
window.joinGroup = async () => {
  try {
    group = await api("/groups/join", { method: "POST",
      body: JSON.stringify({ invite_code: $("gcode").value.toUpperCase() }) });
    renderGroup();
  } catch (e) { alert(e); }
};

$("orb").onclick = () => $("panel").classList.toggle("open");

function addMsg(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls; d.textContent = text;
  $("log").appendChild(d); $("log").scrollTop = 1e9;
  return d;
}

// One path to the agent, shared by the chat box and the host's report buttons,
// so a decision made by clicking is the same conversation as one made by typing.
async function askOrbi(text) {
  $("panel").classList.add("open");   // the host must see what Orbi did
  addMsg("user", text);
  const thinking = addMsg("step", "Orbi is thinking…");
  try {
    const res = await api("/chat", { method: "POST", body: JSON.stringify({
      group_id: group ? group.id : null, message: text, history }) });
    thinking.remove();
    for (const s of res.trace)
      if (s.kind === "tool_call") addMsg("step", `⚙ ${s.name}(${JSON.stringify(s.detail)})`);
    addMsg("orbi", res.reply);
    history.push({ role: "user", content: text },
                 { role: "assistant", content: res.reply });
    history = history.slice(-40);
  } catch (err) { thinking.textContent = "Error: " + err; }
  renderPlans().catch(() => {});   // the agent may have just changed the plan
}

$("chatform").onsubmit = (e) => {
  e.preventDefault();
  const text = $("chatinput").value.trim();
  if (!text) return;
  $("chatinput").value = "";
  askOrbi(text);
};

boot();
</script>
</body>
</html>
