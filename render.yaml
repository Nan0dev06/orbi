# Render Blueprint — provisions the backend + a free Postgres in one step.
# In the Render dashboard: New -> Blueprint -> connect this repo -> Apply.
# See docs/deploy.md for the full walkthrough (env vars, Google redirect URI).
databases:
  - name: nudgy-db
    plan: free
    databaseName: nudgy
    user: nudgy

services:
  - type: web
    name: nudgy
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    envVars:
      # Injected automatically from the Postgres instance above.
      - key: DATABASE_URL
        fromDatabase:
          name: nudgy-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: LLM_PROVIDER
        value: groq
      # Groq's free limits are per-model. llama-3.3-70b-versatile (100K
      # tokens/day, 12K/min) is the best currently-available model for the
      # agent's tool calling; llama-3.1-8b-instant has a bigger budget
      # (500K/day) but is weaker at tools. The old llama-4-scout was removed
      # from Groq's catalog (404s), so it's no longer an option.
      - key: NUDGY_MODEL
        value: llama-3.3-70b-versatile
      # Render generates a strong value once and keeps it stable.
      - key: SECRET_KEY
        generateValue: true
      # sync:false -> you paste these in the dashboard; never stored in git.
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
