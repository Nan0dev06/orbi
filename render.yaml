# Render Blueprint — provisions the backend + a free Postgres in one step.
# In the Render dashboard: New -> Blueprint -> connect this repo -> Apply.
# See docs/deploy.md for the full walkthrough (env vars, Google redirect URI).
databases:
  - name: orbi-db
    plan: free
    databaseName: orbi
    user: orbi

services:
  - type: web
    name: orbi
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    envVars:
      # Injected automatically from the Postgres instance above.
      - key: DATABASE_URL
        fromDatabase:
          name: orbi-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: LLM_PROVIDER
        value: groq
      # Groq's free limits are per-model, and llama-3.3-70b-versatile has the
      # tightest of them: 100K tokens/day and only 12K/minute. One agent turn
      # costs ~4K tokens per LLM call and takes 3-4 calls, so the 70b runs out
      # mid-demo. Scout has 500K/day and 30K/min on the same free tier.
      - key: ORBI_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      # Render generates a strong value once and keeps it stable.
      - key: SECRET_KEY
        generateValue: true
      # sync:false -> you paste these in the dashboard; never stored in git.
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
